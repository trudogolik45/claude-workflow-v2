name: Validate Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate JSON syntax
        run: |
          echo "=== Validating JSON files ==="
          errors=0
          while IFS= read -r f; do
            if python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "  OK: $f"
            else
              echo "  FAIL: $f"
              errors=$((errors + 1))
            fi
          done < <(find . -name '*.json' -not -path './.git/*' -not -path '*/node_modules/*')

          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors JSON file(s) have syntax errors"
            exit 1
          fi
          echo "All JSON files are valid."

      - name: Validate Codex hook script references
        run: |
          echo "=== Checking Codex hook script references ==="
          errors=0
          scripts=$(python3 -c "
          import json
          import re
          with open('.codex/hooks.json') as f:
              data = json.load(f)
          for event_hooks in data.get('hooks', {}).values():
              for group in event_hooks:
                  for hook in group.get('hooks', []):
                      cmd = hook.get('command', '')
                      for match in re.findall(r'/hooks/([^\"\\s]+\\.(?:py|sh))', cmd):
                          print(f'hooks/{match}')
          ")

          for script in $scripts; do
            if [ -f "$script" ]; then
              echo "  OK: $script exists"
            else
              echo "  FAIL: $script not found (referenced in .codex/hooks.json)"
              errors=$((errors + 1))
            fi
          done

          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors hook script reference(s) are broken"
            exit 1
          fi
          echo "All hook script references are valid."

      - name: Check Python syntax for .py hooks
        run: |
          echo "=== Checking Python syntax ==="
          errors=0
          while IFS= read -r f; do
            if python3 -m py_compile "$f" 2>/dev/null; then
              echo "  OK: $f"
            else
              echo "  FAIL: $f"
              errors=$((errors + 1))
            fi
          done < <(find hooks -name '*.py' 2>/dev/null)

          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors Python hook(s) have syntax errors"
            exit 1
          fi
          echo "All Python hooks have valid syntax."

      - name: Check Bash syntax for .sh hooks
        run: |
          echo "=== Checking Bash syntax ==="
          errors=0
          while IFS= read -r f; do
            if bash -n "$f" 2>/dev/null; then
              echo "  OK: $f"
            else
              echo "  FAIL: $f"
              errors=$((errors + 1))
            fi
          done < <(find hooks -name '*.sh' 2>/dev/null)

          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors Bash hook(s) have syntax errors"
            exit 1
          fi
          echo "All Bash hooks have valid syntax."

      - name: Validate Codex agent configuration
        run: |
          echo "=== Validating Codex agent TOML ==="
          errors=0
          python3 - <<'PY'
          import sys
          import tomllib
          from pathlib import Path

          errors = 0

          config_path = Path(".codex/config.toml")
          if not config_path.exists():
              print("  FAIL: .codex/config.toml is missing")
              sys.exit(1)

          config = tomllib.loads(config_path.read_text(encoding="utf-8"))
          agents = config.get("agents", {})
          role_names = [name for name, value in agents.items() if isinstance(value, dict)]
          if not role_names:
              print("  FAIL: .codex/config.toml does not declare any [agents.<name>] roles")
              sys.exit(1)

          for role_name in sorted(role_names):
              role = agents[role_name]
              config_file = role.get("config_file")
              if not config_file:
                  print(f"  FAIL: agent '{role_name}' is missing config_file")
                  errors += 1
                  continue
              agent_path = (config_path.parent / config_file).resolve()
              if not agent_path.exists():
                  print(f"  FAIL: agent '{role_name}' references missing {config_file}")
                  errors += 1
                  continue
              agent_config = tomllib.loads(agent_path.read_text(encoding='utf-8'))
              if "developer_instructions" not in agent_config:
                  print(f"  FAIL: {agent_path} is missing developer_instructions")
                  errors += 1
                  continue
              if "name" in agent_config or "description" in agent_config:
                  print(f"  FAIL: {agent_path} still contains legacy top-level name/description")
                  errors += 1
                  continue
              print(f"  OK: {role_name} -> {config_file}")

          if errors:
              sys.exit(1)
          PY

      - name: Validate skill frontmatter
        run: |
          echo "=== Validating skill YAML frontmatter ==="
          errors=0
          required_fields="name description"

          for f in skills/*/SKILL.md; do
            [ -f "$f" ] || continue
            frontmatter=$(sed -n '/^---$/,/^---$/p' "$f" | sed '1d;$d')
            if [ -z "$frontmatter" ]; then
              echo "  FAIL: $f - no YAML frontmatter found"
              errors=$((errors + 1))
              continue
            fi

            missing=""
            for field in $required_fields; do
              if ! echo "$frontmatter" | grep -q "^${field}:"; then
                missing="$missing $field"
              fi
            done

            if [ -n "$missing" ]; then
              echo "  FAIL: $f - missing required fields:$missing"
              errors=$((errors + 1))
            else
              echo "  OK: $f"
            fi
          done

          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors skill file(s) have frontmatter issues"
            exit 1
          fi
          echo "All skill frontmatter is valid."

      - name: Validate Codex plugin manifest references
        run: |
          echo "=== Validating Codex plugin manifest references ==="
          errors=0
          python3 - <<'PY'
          import json
          from pathlib import Path

          root = Path(".")
          manifest_path = root / ".codex-plugin" / "plugin.json"
          if not manifest_path.exists():
              print("  FAIL: .codex-plugin/plugin.json is missing")
              raise SystemExit(1)

          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          for key in ("skills", "hooks"):
              rel = manifest.get(key)
              if not rel:
                  continue
              target = (root / rel).resolve()
              if not target.exists():
                  print(f"  FAIL: manifest {key} path does not exist: {rel}")
                  raise SystemExit(1)
              print(f"  OK: manifest {key} path exists -> {rel}")

          for key in ("composerIcon", "logo"):
              rel = manifest.get("interface", {}).get(key)
              if not rel:
                  continue
              target = (root / rel).resolve()
              if not target.exists():
                  print(f"  FAIL: interface asset missing: {rel}")
                  raise SystemExit(1)
              print(f"  OK: interface asset exists -> {rel}")

          for rel in manifest.get("interface", {}).get("screenshots", []):
              target = (root / rel).resolve()
              if not target.exists():
                  print(f"  FAIL: screenshot missing: {rel}")
                  raise SystemExit(1)
              print(f"  OK: screenshot exists -> {rel}")
          PY

          echo "Manifest reference check complete."

      - name: Summary
        if: always()
        run: |
          echo "============================================"
          echo "  Plugin Validation Complete"
          echo "============================================"
          echo ""
          echo "Checks performed:"
          echo "  1. JSON syntax validation"
          echo "  2. Codex hook script reference validation"
          echo "  3. Python hook syntax check"
          echo "  4. Bash hook syntax check"
          echo "  5. Codex agent TOML + registration validation"
          echo "  6. Skill frontmatter validation (name, description)"
          echo "  7. Codex plugin manifest reference validation"
