[features]
codex_hooks = true
multi_agent = true

[agents.orchestrator]
description = "Master coordinator for complex multi-step tasks. Use when a task involves 2+ modules, requires delegation to specialists, needs architectural planning, or involves PR workflows."
config_file = "./agents/orchestrator.toml"

[agents.code-reviewer]
description = "Expert code review specialist. Use after writing or modifying code, before commits, for PR review, code quality check, or standards audit."
config_file = "./agents/code-reviewer.toml"

[agents.debugger]
description = "Expert debugging specialist for errors, test failures, crashes, memory leaks, race conditions, and unexpected behavior. Use when encountering any error, exception, or failing test."
config_file = "./agents/debugger.toml"

[agents.docs-writer]
description = "Technical documentation specialist. Use for READMEs, API docs, architecture docs, changelogs, migration guides, and inline comments."
config_file = "./agents/docs-writer.toml"

[agents.security-auditor]
description = "Security specialist for vulnerability detection and secure coding review. Use when handling authentication, authorization, encryption, secrets, credentials, OAuth, JWT, CORS, user input, API keys, or sensitive data."
config_file = "./agents/security-auditor.toml"

[agents.refactorer]
description = "Code refactoring specialist for improving code quality, reducing technical debt, and applying design patterns. Use when code needs restructuring, simplification, or DRY/SOLID principles."
config_file = "./agents/refactorer.toml"

[agents.test-architect]
description = "Testing strategy specialist for designing test suites, writing tests, and ensuring comprehensive coverage. Use when adding features, fixing bugs, improving coverage, or writing integration/E2E tests."
config_file = "./agents/test-architect.toml"
